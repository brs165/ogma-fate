  <script>
  // SPA-03: History API router
  // Reads pathname, detects /ogma-fate/[camp] clean URLs, mounts CampaignApp
  // or falls back to LandingApp. Campaign data files are injected dynamically.
  (function() {
    var CAMPS = ['thelongafter','cyberpunk','fantasy','space','victorian','postapoc','western'];
    var BASE  = '/ogma-fate'; // GitHub Pages repo root; adjust if repo name differs

    // Resolve slug from pathname — handle /ogma-fate/fantasy or /ogma-fate/fantasy/
    function slugFromPath(p) {
      var seg = p.replace(BASE, '').replace(/^\//, '').replace(/\/$/, '').split('/')[0];
      return CAMPS.indexOf(seg) !== -1 ? seg : null;
    }

    var campId = slugFromPath(location.pathname);

    if (!campId) {
      // Landing page — scripts already loaded, just mount
      ReactDOM.createRoot(document.getElementById('root')).render(
        React.createElement(LandingApp)
      );
      return;
    }

    // Campaign route — inject engine.js + universal.js + [camp].js then mount
    function loadScript(src, cb) {
      var s = document.createElement('script');
      s.src = src;
      s.onload = cb;
      s.onerror = function() { console.error('[router] failed to load', src); cb(); };
      document.head.appendChild(s);
    }

    var v = '?v=223'; // stamped by bump-version.sh — BUG FIX: was hardcoded to v94
    var base = ''; // index.html is at repo root

    loadScript(base + 'data/shared.js' + v, function() {
      loadScript(base + 'data/universal.js' + v, function() {
        loadScript(base + 'data/' + campId + '.js' + v, function() {
          loadScript(base + 'core/engine.js' + v, function() {
            ReactDOM.createRoot(document.getElementById('root')).render(
              React.createElement(CampaignApp, {campId: campId})
            );
          });
        });
      });
    });

    // History API: intercept same-origin navigations so the SPA handles them
    document.addEventListener('click', function(e) {
      var a = e.target.closest('a[href]');
      if (!a) return;
      var url;
      try { url = new URL(a.href); } catch(_) { return; }
      if (url.origin !== location.origin) return;
      var path = url.pathname;
      // Intercept clean campaign URLs (/ogma-fate/fantasy)
      var slug = slugFromPath(path);
      // Also intercept campaigns/fantasy.html direct links
      if (!slug) {
        var m = path.match(/\/campaigns\/([a-z]+)\.html$/);
        if (m && CAMPS.indexOf(m[1]) !== -1) slug = m[1];
      }
      if (!slug) return;
      e.preventDefault();
      history.pushState({campId: slug}, '', '/' + 'ogma-fate' + '/' + slug);
      window.__ogmaRoute(slug);
    });

    window.addEventListener('popstate', function(e) {
      var slug = (e.state && e.state.campId) || slugFromPath(location.pathname);
      if (slug) window.__ogmaRoute(slug);
      else {
        ReactDOM.createRoot(document.getElementById('root')).render(
          React.createElement(LandingApp)
        );
      }
    });

    // Expose route handler for popstate
    window.__ogmaRoute = function(slug) {
      var root = document.getElementById('root');
      ReactDOM.createRoot(root).render(
        React.createElement(CampaignApp, {campId: slug})
      );
    };
  })();
  </script>

    if ('serviceWorker' in navigator) {

        navigator.serviceWorker.register('sw.js').then(function(reg) {
          // Detect when a new SW has activated (new version deployed)
          navigator.serviceWorker.addEventListener('controllerchange', function() {
            // Avoid showing on very first install (no previous controller)
            if (navigator._swFirstInstall) return;
            // Show the update toast — let the app handle the message
            if (window.__showUpdateToast) window.__showUpdateToast();
          });
          // Track first install
          if (!navigator.serviceWorker.controller) {
            navigator._swFirstInstall = true;
          }
        }).catch(function(err) {
          console.info('[SW] Registration skipped:', err.message);
        });
      });
    }
  </script>
