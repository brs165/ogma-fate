<!DOCTYPE html>
<html lang="en" data-theme="dark" class="board-root">
<head>
  <script>(function(){try{var p=JSON.parse(localStorage.getItem('fate_prefs_v1')||'{}');var t=p.theme||localStorage.getItem('fate_theme')||'dark';document.documentElement.setAttribute('data-theme',t);}catch(e){}})()</script>
  <base href="/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Board — Ogma</title>
  <meta name="description" content="Ogma Board — spatial Fate Condensed GM workspace">
  <link rel="icon" type="image/svg+xml" href="../assets/favicons/icon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="../assets/favicons/apple-touch-icon.png">
  <link rel="manifest" href="../manifest.json">
  <link rel="stylesheet" href="../assets/css/theme.css?v=297">
</head>
<body>
  <a href="#board-canvas" class="skip-link">Skip to canvas</a>
  <div id="root"></div>

  <!-- React + Dexie CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" integrity="sha384-tMH8h3BGESGckSAVGZ82T9n90ztNXxvdwvdM6UoR56cYcf+0iGXBliJ29D+wZ/x8" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" integrity="sha384-bm7MnzvK++ykSwVJ2tynSE5TRdN+xL418osEVF2DE/L/gfWHj91J2Sphe582B1Bh" crossorigin="anonymous"></script>

  <!-- Shared data — all worlds loaded for board (world selected at runtime) -->
  <script src="../data/shared.js?v=297"></script>
  <script src="../data/universal.js?v=297"></script>
  <script src="../data/thelongafter.js?v=297"></script>
  <script src="../data/cyberpunk.js?v=297"></script>
  <script src="../data/fantasy.js?v=297"></script>
  <script src="../data/space.js?v=297"></script>
  <script src="../data/victorian.js?v=297"></script>
  <script src="../data/postapoc.js?v=297"></script>
  <script src="../data/western.js?v=297"></script>
  <script src="../data/dVentiRealm.js?v=297"></script>

  <!-- Core -->
  <script src="../core/config.js?v=1"></script>
  <script src="../core/engine.js?v=297"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dexie/4.0.10/dexie.min.js" integrity="sha384-3VWLzUTczDc/wazaoH+b5qG4iME0duPONRO281rRiaFkfpV/b3w5uxrvod7rCHcW" crossorigin="anonymous"></script>
  <script src="../core/db.js?v=297"></script>
  <script src="../core/ui-primitives.js?v=297"></script>
  <script src="../assets/js/partysocket.js?v=257"></script>
  <script src="../core/ui-renderers.js?v=297"></script>

  <!-- Board UI —— ui-table.js provides TpDicePanel; ui.js provides FatePointTracker, createTableSync, DEFAULT_FP_STATE -->
  <script src="../core/ui-table.js?v=297"></script>
  <script src="../core/ui-modals.js?v=297"></script>
  <script src="../core/ui.js?v=297"></script>
  <script src="../core/ui-board.js?v=286"></script>

  <script>
    try {
      var campId = (new URLSearchParams(location.search)).get('world') || 'fantasy';
      ReactDOM.createRoot(document.getElementById('root')).render(
        React.createElement(ErrorBoundary, {label: 'board'},
          React.createElement(BoardApp, {campId: campId})
        )
      );
    } catch(e) {
      document.getElementById('root').innerHTML =
        '<div style="padding:40px;font-family:monospace;color:#c00"><b>Board failed to start</b><br><br>' + e.message + '</div>';
      console.error('[Board mount error]', e);
    }
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js').catch(function(err) {
          console.info('[SW] Registration skipped:', err.message);
        });
      });
    }
  </script>
</body>
</html>
