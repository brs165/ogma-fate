<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,600;1,700&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Ogma — Run Session</title>
  <script>
    // run.html is now Board in Play mode.
    // Preserve ?world= and ?room= params in the redirect.
    (function() {
      var params = new URLSearchParams(window.location.search);
      var world = params.get('world');
      var room  = params.get('room');
      var dest  = '/campaigns/board.html';
      var q = [];
      if (world) q.push('world=' + encodeURIComponent(world));
      if (room)  q.push('room='  + encodeURIComponent(room));
      // Switch to play mode automatically when coming from run.html
      q.push('mode=play');
      if (q.length) dest += '?' + q.join('&');
      window.location.replace(dest);
    })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0;url=/campaigns/board.html?mode=play">
    <p>Redirecting to Board... <a href="/campaigns/board.html?mode=play">click here</a></p>
  </noscript>
</head>
<body></main>
</body>
</html>
