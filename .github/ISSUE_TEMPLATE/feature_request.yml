name: Feature Request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the GM workflow or pain point.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Generators (new content type)
        - World content (new world or entries)
        - Table canvas
        - Run surface
        - Multiplayer
        - Help / documentation
        - Accessibility
        - Other
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: Searched existing issues — not a duplicate
          required: true
        - label: Fits the offline-first, no-backend architecture
          required: true
