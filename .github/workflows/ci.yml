name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    name: QA + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: QA Hard (187 checks)
        run: node scripts/qa-hard.mjs

      - name: QA Export (166 checks)
        run: node scripts/qa-export.mjs

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          test -f build/index.html || exit 1
          test -f build/404.html || exit 1
          test -f build/sw.js || exit 1
          test -f build/manifest.json || exit 1
          echo "Build output verified"
