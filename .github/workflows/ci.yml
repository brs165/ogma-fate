name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    name: QA + Build + Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: QA Hard (188 checks)
        run: node scripts/qa-hard.mjs

      - name: QA Export (166 checks)
        run: node scripts/qa-export.mjs

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          test -f build/index.html || exit 1
          test -f build/sw.js || exit 1
          test -f build/manifest.json || exit 1
          echo "Build output verified"

      # --- Playwright Setup (Chromium Only) ---
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npm ls playwright --json | jq -r '.dependencies["playwright"].version')" >> $GITHUB_OUTPUT

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install OS Dependencies (if cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # --- Browser Smoke Tests ---
      - name: QA Smoke (Playwright)
        run: node scripts/qa-smoke.mjs
